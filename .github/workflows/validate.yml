name: validate

on:
  push:
  pull_request:

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          python3 -m json.tool MANIFEST.json >/dev/null
          for f in proofs/sanitized/*.json; do
            python3 -m json.tool "$f" >/dev/null
          done
      - name: Validate discovery files
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("sitemap.xml")
          required = ["OAI-SearchBot", "GPTBot", "ChatGPT-User", "Sitemap:"]
          robots = open("robots.txt", encoding="utf-8").read()
          missing = [item for item in required if item not in robots]
          if missing:
              raise SystemExit(f"robots.txt missing: {missing}")
          PY
      - name: Run sovereign audit
        run: python3 tools/pnva_sovereign_audit.py --repo . --strict-public --min-score 80 >/tmp/pnva-sovereign-audit.json
      - name: Run canonical bridge demo
        run: |
          python3 tools/pnva_canonical_bridge.py --demo \
            --output /tmp/pnva-events.jsonl \
            --entity-catalog /tmp/pnva-entities.json \
            --summary /tmp/pnva-bridge-summary.json
          test -s /tmp/pnva-events.jsonl
          python3 -m json.tool /tmp/pnva-entities.json >/dev/null
          python3 -m json.tool /tmp/pnva-bridge-summary.json >/dev/null
      - name: Run replay validator
        run: python3 tools/pnva_replay_validator.py --events reports/pnva-canonical-events-sample-2026-05-05.jsonl --entity-catalog reports/pnva-entity-catalog-2026-05-05.json >/tmp/pnva-replay-validation.json
      - name: Run no-tick invariant analyzer
        run: python3 tools/pnva_no_tick_invariant_analyzer.py --events reports/pnva-canonical-events-sample-2026-05-05.jsonl --entity-catalog reports/pnva-entity-catalog-2026-05-05.json --replay-report reports/pnva-replay-validation-2026-05-05.json >/tmp/pnva-no-tick-invariants.json
      - name: Run native event emitter demo
        run: |
          python3 tools/pnva_native_event_emitter.py \
            --events /tmp/pnva-native-events.jsonl \
            --entity-catalog /tmp/pnva-native-entities.json \
            --summary /tmp/pnva-native-summary.json
          python3 tools/pnva_replay_validator.py \
            --events /tmp/pnva-native-events.jsonl \
            --entity-catalog /tmp/pnva-native-entities.json \
            --write /tmp/pnva-native-replay.json >/dev/null
          python3 tools/pnva_no_tick_invariant_analyzer.py \
            --events /tmp/pnva-native-events.jsonl \
            --entity-catalog /tmp/pnva-native-entities.json \
            --replay-report /tmp/pnva-native-replay.json \
            --write /tmp/pnva-native-invariants.json >/dev/null
          python3 -m json.tool /tmp/pnva-native-summary.json >/dev/null
          python3 -m json.tool /tmp/pnva-native-entities.json >/dev/null
          python3 -m json.tool /tmp/pnva-native-replay.json >/dev/null
          python3 -m json.tool /tmp/pnva-native-invariants.json >/dev/null
      - name: Run sovereign policy validator
        run: |
          python3 tools/pnva_sovereign_policy_validator.py \
            --events reports/pnva-canonical-events-sample-2026-05-05.jsonl \
            --entity-catalog reports/pnva-entity-catalog-2026-05-05.json \
            >/tmp/pnva-sovereign-policy.json
          python3 tools/pnva_sovereign_policy_validator.py \
            --events reports/pnva-native-events-demo-2026-05-05.jsonl \
            --entity-catalog reports/pnva-native-entity-catalog-demo-2026-05-05.json \
            >/tmp/pnva-native-sovereign-policy.json
          python3 -m json.tool /tmp/pnva-sovereign-policy.json >/dev/null
          python3 -m json.tool /tmp/pnva-native-sovereign-policy.json >/dev/null
      - name: Run proof chain sealer
        run: |
          python3 tools/pnva_proof_chain_sealer.py \
            --events reports/pnva-canonical-events-sample-2026-05-05.jsonl \
            >/tmp/pnva-proof-chain.json
          python3 tools/pnva_proof_chain_sealer.py \
            --events reports/pnva-native-events-demo-2026-05-05.jsonl \
            >/tmp/pnva-native-proof-chain.json
          python3 -m json.tool /tmp/pnva-proof-chain.json >/dev/null
          python3 -m json.tool /tmp/pnva-native-proof-chain.json >/dev/null
      - name: Run causal graph auditor
