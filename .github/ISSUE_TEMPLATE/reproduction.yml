name: Reproduction report
description: Report an independent PNVA-Core reproduction attempt.
title: "[reproduction]: "
labels: ["reproduction", "evidence"]
body:
  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: CPU, RAM, GPU
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Kernel
      placeholder: Distribution and kernel version
    validations:
      required: true
  - type: dropdown
    id: gate
    attributes:
      label: Gate
      options:
        - 15m
        - 8h
        - 12h
        - 24h
        - G1
        - production-candidate
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Result
      options:
        - PASS
        - FAIL
        - PARTIAL
        - INCONCLUSIVE
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Attach only sanitized artifacts.
    validations:
      required: false

